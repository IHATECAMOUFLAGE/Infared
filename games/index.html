<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Infared</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link id="favicon" rel="icon" href="https://t1.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://universal.neptunenavigate.com/&size=256" type="image/x-icon">
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <loadpage>
    <div id="loader-spinner"></div>
    <iframe></iframe>
    <div id="iframe-error">Failed to load this game</div>
    <button id="closefullscreen" onclick="unloadPage()" data-type="close">
      <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f">
        <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/>
      </svg>
    </button>
  </loadpage>

  <div class="noise-overlay"></div>

  <style>
    iframe, loadpage {
      width: 100%;
      height: 100%;
    }
    * {
      cursor: initial;
    }
    .search-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 20px 0 10px;
      position: relative;
    }
    #searchInput {
      width: 60%;
      max-width: 480px;
      padding: 14px 20px;
      font-size: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      outline: none;
      backdrop-filter: blur(10px);
      transition: border-color 0.2s ease, background 0.2s ease;
      letter-spacing: 0.08em;
    }
    #searchInput::placeholder {
      color: var(--text-muted);
    }
    #searchInput:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
    }
    #suggestionsBox {
      position: absolute;
      top: 55px;
      width: 200px;
      max-width: 300px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 0;
      display: none;
      z-index: 50;
    }
    .suggestion-item {
      padding: 10px 18px;
      cursor: pointer;
      color: var(--text-muted);
      transition: background 0.15s ease;
    }
    .suggestion-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--accent);
    }
    #recentlyPlayed {
      margin: 40px 0 20px;
    }
    .recent-title {
      font-size: 20px;
      margin-bottom: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .recent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 0.5fr));
      gap: 22px;
    }
    .game-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      max-width: 300px;
    }
    .game-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(14px) brightness(0.55);
      transform: scale(1.25);
      z-index: 0;
    }
    .game-content {
      position: relative;
      z-index: 2;
      text-align: center;
    }
    .game-thumb {
      width: 110px;
      height: 110px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.25);
      margin-bottom: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
    }
    .hero {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }
  </style>

  <header class="hero">
    <h1 class="hero-title">INFARED <span>// GAMES</span></h1>
    <p class="hero-sub">
      <i>NOTE: Some games may not load due to us removing their redirect ads :(</i><br><br>
      <span id="gameCount"></span>
    </p>
  </header>

  <div class="search-wrapper">
    <input id="searchInput" type="text" placeholder="Search games..." />
    <div id="suggestionsBox"></div>
  </div>

  <div id="recentlyPlayed" class="content">
    <div class="recent-title">Recently Played</div>
    <div id="recentGrid" class="recent-grid"></div>
  </div>

  <main class="content">
    <div class="recent-title">All Games</div>
    <section id="gamesGrid" class="module-grid"></section>
  </main>

  <footer class="footer">
    <span>// INFARED</span>
    <span class="footer-divider"></span>
    <span>Build V0.1</span>
  </footer>

  <script>
    let fsm = false;

    function sanitizeHTML(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");

      const badScriptPatterns = [
        /_0x[0-9a-f]{3,}/i,
        /WQQBBfeTFHJhHyWLwCX/i,
        /gVbNRDMRNuV/i,
        /TextDecoder/i,
        /crypto\.randomUUID/i,
        /constructor\("return this"\)/i,
        /\(\(\.\+\)\+\)\+\)\+\$/i,
        /console\.(log|warn|error|trace)\s*=\s*/i,
        /location\.(href|assign|replace)/i,
        /window\.top\.location/i,
        /setInterval\s*\(/i,
        /document\.createElement\(["']iframe["']\)/i
      ];

      doc.querySelectorAll("script:not([src])").forEach(s => {
        const code = s.textContent || "";
        if (badScriptPatterns.some(p => p.test(code))) {
          s.remove();
        } else {
          s.remove();
        }
      });

      doc.querySelectorAll("script[src]").forEach(s => {
        const src = s.getAttribute("src") || "";
        if (badScriptPatterns.some(p => p.test(src))) {
          s.remove();
        }
      });

      doc.querySelectorAll("meta[http-equiv]").forEach(m => {
        const hv = m.getAttribute("http-equiv");
        const content = (m.getAttribute("content") || "").toLowerCase();
        if (hv && hv.toLowerCase() === "refresh" && (content.includes("http://") || content.includes("https://"))) {
          m.remove();
        }
      });

      doc.querySelectorAll("iframe").forEach(f => {
        const src = f.getAttribute("src") || "";
        if (/http/i.test(src)) f.remove();
      });

      const cleanLoader = doc.createElement("script");
      cleanLoader.textContent = `
        window.addEventListener("load", () => {
          if (typeof window.runGame === "function") {
            try { window.runGame(); } catch (e) { console.error(e); }
          }
        });
      `;
      doc.body.appendChild(cleanLoader);

      return "<!DOCTYPE html>" + doc.documentElement.outerHTML;
    }

    function loadPage(page, gameObj) {
      saveRecentlyPlayed(gameObj);
      const loadpage = document.querySelector("loadpage");
      const iframe = loadpage.querySelector("iframe");
      const spinner = document.getElementById("loader-spinner");
      const errorBox = document.getElementById("iframe-error");
      spinner.style.display = "block";
      iframe.style.display = "none";
      errorBox.style.display = "none";
      document.querySelector("#gamesGrid").style.display = "none";

      fetch(page)
        .then(r => r.text())
        .then(html => {
          const clean = sanitizeHTML(html);
          iframe.srcdoc = clean;
          spinner.style.display = "none";
          iframe.style.display = "block";
        })
        .catch(() => {
          spinner.style.display = "none";
          errorBox.style.display = "block";
        });

      loadpage.classList.add("visible");
      fsm = true;
      document.getElementById("closefullscreen").style.display = "flex";
    }

    function unloadPage() {
      const loadpage = document.querySelector("loadpage");
      const oldIframe = loadpage.querySelector("iframe");
      oldIframe.remove();
      const newIframe = document.createElement("iframe");
      newIframe.setAttribute("sandbox", "allow-scripts allow-same-origin");
      loadpage.prepend(newIframe);
      loadpage.classList.remove("visible");
      fsm = false;
      document.getElementById("closefullscreen").style.display = "none";
      document.querySelector("#gamesGrid").style.display = "grid";
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Escape" && fsm) unloadPage();
    });
  </script>

  <script>
    let allGames = [];
    let visibleGames = 0;
    const INITIAL_LOAD = 100;
    const LOAD_MORE = 50;
    let loadingMore = false;

    const zonesurls = [
      "https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json",
      "https://cdn.jsdelivr.net/gh/gn-math/assets@latest/zones.json",
      "https://cdn.jsdelivr.net/gh/gn-math/assets@master/zones.json",
      "https://cdn.jsdelivr.net/gh/gn-math/assets/zones.json"
    ];

    let zonesURL = zonesurls[Math.floor(Math.random() * zonesurls.length)];

    const COVER_URL = "https://cdn.jsdelivr.net/gh/gn-math/covers@main";
    const HTML_URL = "https://cdn.jsdelivr.net/gh/gn-math/html@main";

    async function fetchZones() {
      try {
        const shaRes = await fetch("https://api.github.com/repos/gn-math/assets/commits?t=" + Date.now());
        if (shaRes.ok) {
          const shaJson = await shaRes.json();
          const sha = shaJson[0].sha;
          zonesURL = "https://cdn.jsdelivr.net/gh/gn-math/assets@" + sha + "/zones.json";
        }
      } catch (e) {}
      const response = await fetch(zonesURL + "?t=" + Date.now());
      return await response.json();
    }

    function createGameCard(game) {
      const finalURL = game.url
        .replace("{COVER_URL}", COVER_URL)
        .replace("{HTML_URL}", HTML_URL);
      const coverURL = game.cover.replace("{COVER_URL}", COVER_URL);
      const card = document.createElement("article");
      card.className = "module game-card";
      card.setAttribute("data-title", true);
      card.innerHTML = `
        <div class="game-bg" style="background-image: url('${coverURL}')"></div>
        <div class="game-content">
          <img class="game-thumb" src="${coverURL}" loading="lazy">
          <h2 class="module-title">${game.name}</h2>
          <p class="module-desc"><i>${game.author}</i></p>
          <a class="module-link">Play →</a>
        </div>
        <div class="module-glow games-glow"></div>
      `;
      card.querySelector(".module-link").onclick = () => loadPage(finalURL, game);
      return card;
    }

    function renderGames(amount) {
      const grid = document.querySelector("#gamesGrid");
      for (let i = visibleGames; i < visibleGames + amount && i < allGames.length; i++) {
        grid.appendChild(createGameCard(allGames[i]));
      }
      visibleGames += amount;
      document.querySelector("#gameCount").innerHTML = `<i>Showing ${visibleGames} of ${allGames.length} games</i>`;
    }

    function setupInfiniteScroll() {
      const sentinel = document.createElement("div");
      sentinel.id = "scrollSentinel";
      sentinel.style.height = "40px";
      document.querySelector("main").appendChild(sentinel);
      const observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting && !loadingMore) {
          loadingMore = true;
          renderGames(LOAD_MORE);
          loadingMore = false;
        }
      });
      observer.observe(sentinel);
    }

    function updateSuggestions(query) {
      const box = document.getElementById("suggestionsBox");
      box.innerHTML = "";
      if (!query.trim()) {
        box.style.display = "none";
        return;
      }
      const q = query.toLowerCase();
      const matches = allGames
        .filter(g => g.name.toLowerCase().includes(q) || g.author.toLowerCase().includes(q))
        .slice(0, 8);
      if (matches.length === 0) {
        box.style.display = "none";
        return;
      }
      matches.forEach(game => {
        const item = document.createElement("div");
        item.className = "suggestion-item";
        item.textContent = `${game.name} - ${game.author}`;
        item.onclick = () => {
          document.getElementById("searchInput").value = game.name;
          searchGames(game.name);
          box.style.display = "none";
        };
        box.appendChild(item);
      });
      box.style.display = "block";
    }

    function searchGames(query) {
      const grid = document.querySelector("#gamesGrid");
      grid.innerHTML = "";
      const sentinel = document.getElementById("scrollSentinel");
      if (sentinel) sentinel.style.display = query.trim() === "" ? "block" : "none";
      if (!query.trim()) {
        visibleGames = 0;
        renderGames(INITIAL_LOAD);
        return;
      }
      const q = query.toLowerCase();
      const results = allGames.filter(g => g.name.toLowerCase().includes(q) || g.author.toLowerCase().includes(q));
      results.forEach(game => {
        grid.appendChild(createGameCard(game));
      });
      document.querySelector("#gameCount").innerHTML = `<i>Found ${results.length} matching games</i>`;
    }

    document.getElementById("searchInput").addEventListener("input", e => {
      updateSuggestions(e.target.value);
      searchGames(e.target.value);
    });

    function saveRecentlyPlayed(game) {
      let list = JSON.parse(localStorage.getItem("recentlyPlayed") || "[]");
      list = list.filter(g => g.id !== game.id);
      list.unshift(game);
      if (list.length > 8) list.pop();
      localStorage.setItem("recentlyPlayed", JSON.stringify(list));
      renderRecentlyPlayed();
    }

    function renderRecentlyPlayed() {
      const grid = document.getElementById("recentGrid");
      grid.innerHTML = "";
      const list = JSON.parse(localStorage.getItem("recentlyPlayed") || "[]");
      list.forEach(game => {
        grid.appendChild(createGameCard(game));
      });
    }

    async function init() {
      try {
        const cards = await fetchZones();
        allGames = cards.filter(g => g.id !== -1);
        renderRecentlyPlayed();
        renderGames(INITIAL_LOAD);
        setupInfiniteScroll();
      } catch (error) {
        console.error(error);
        alert("FAILED TO LOAD GAMES: " + error);
      }
    }

    init();
  </script>

  <script src="../lanschoolblocker.js"></script>
  <script>
    IMAGEURL = "../img/launchpadLSCOVER";
  </script>
</body>
</html>
